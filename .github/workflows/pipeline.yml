name: CI Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read      
  security-events: write  
  actions: read

jobs:
  # 1. Build & Unit Test
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        # [CHANGE]: เปลี่ยนตามภาษาที่ใช้ (เช่น actions/setup-python@v5, actions/setup-go@v5)
        uses: actions/setup-node@v4 
        with:
          # [CHANGE]: เปลี่ยนเลขเวอร์ชันให้ตรงกับภาษาที่ใช้
          node-version: '20' 
          # [CHANGE]: เปลี่ยนตาม Package Manager (เช่น pip, go-module, maven)
          cache: 'npm' 
          
      - name: Install Dependencies
        # [CHANGE]: เปลี่ยนเป็นคำสั่งติดตั้ง Library (เช่น pip install -r requirements.txt หรือ mvn install)
        run: npm ci 
          
      - name: Run Unit Tests
        # [CHANGE]: เปลี่ยนเป็นคำสั่งรัน Test ของภาษานั้นๆ (เช่น pytest หรือ go test ./...)
        run: npx jest --forceExit --detectOpenHandles

  # 2. Security Scan (SAST)
  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # [CHANGE]: ระบุภาษาให้ CodeQL รู้ (เช่น 'python', 'go', 'java-kotlin', 'csharp')
          languages: 'javascript-typescript' 
          
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3

  # 3. Build Image & Scan
  container-security:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        # [CHANGE]: เปลี่ยนชื่อ Tag ของ Image (my-app) ให้เป็นชื่อโปรเจกต์ของคุณ
        run: docker build -t my-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0 
        with:
          # [CHANGE]: เปลี่ยนชื่อ Image ให้ตรงกับขั้นตอน Build ด้านบน
          image-ref: 'my-app:${{ github.sha }}' 
          format: 'table'
          # [CHANGE]: ถ้าอยากให้ Pipeline หยุดทำงานเมื่อเจอช่องโหว่ ให้เปลี่ยนเป็น '1'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'